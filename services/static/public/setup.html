<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Initial Setup — Auth Service</title>
    <meta name="description" content="Create the first administrator account for Auth Service" />
    <script src="/js/head.js"></script>
    <script src="/js/theme.js"></script>
  </head>
  <body class="auth-page min-h-screen font-sans flex items-center justify-center p-4 text-slate-200 antialiased">
    <div class="w-full max-w-md card-glow p-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center">
          <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
        <div>
          <h1 class="text-xl font-semibold text-white">Initial Setup</h1>
          <p class="text-xs text-slate-500">Create the first administrator account</p>
        </div>
      </div>
      <div class="rounded-lg bg-amber-500/5 border border-amber-500/20 px-3 py-2 mb-6 mt-4">
        <p class="text-xs text-amber-300/80">This page is only available when no admin account exists yet.</p>
      </div>
      <form id="f" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Username</label>
          <input name="username" required minlength="2" class="input-dark" placeholder="admin" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Password (min 8 characters)</label>
          <input name="password" type="password" required minlength="8" class="input-dark" placeholder="••••••••" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Bootstrap token (if required)</label>
          <input name="bootstrap" type="password" class="input-dark" placeholder="Optional" />
        </div>
        <p id="err" class="text-sm text-red-400 hidden"></p>
        <button type="submit" class="btn-primary">Continue</button>
      </form>
    </div>
    <script src="/js/common.js"></script>
    <script>
      document.getElementById("f").addEventListener("submit", async function (e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        var headers = {};
        var bt = fd.get("bootstrap");
        if (bt) headers["X-Bootstrap-Token"] = bt;
        var r = await adminApi("/admin/api/bootstrap/register", {
          method: "POST",
          body: { username: fd.get("username"), password: fd.get("password") },
          headers: headers,
        });
        var j = await r.json().catch(function () { return {}; });
        if (!r.ok) {
          document.getElementById("err").textContent = j.error || "Failed";
          document.getElementById("err").classList.remove("hidden");
          return;
        }
        writeCsrf(j.csrf || "");
        window.location.href = "/setup-mfa";
      });
    </script>
  </body>
</html>
